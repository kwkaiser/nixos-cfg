version: "3"

vars:
  host: "vm"
  arch: "linux"
  disks: 3

tasks:
  homelab-vm:
    cmds:
      - |
        export XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/$(id -u)}
        export WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-wayland-1}
        export DISPLAY=${DISPLAY:-:0}
        sudo -E nix run .#nixosConfigurations.homelab.config.system.build.vm & # need sudo for port forwards

      - |
        echo "Waiting for SSH..."
        while true; do
          ssh homelab-vm echo 'connected' && break
          sleep 5
        done
      - |
        echo "Waiting for k3s to be ready..."
        while true; do
          ssh homelab-vm test -f /etc/rancher/k3s/k3s.yaml && break
          echo "  k3s not ready yet, waiting..."
          sleep 5
        done
      - ssh homelab-vm sudo cat /etc/rancher/k3s/k3s.yaml > ~/.kube/config
      - echo "Kubeconfig written to ~/.kube/config"

  homelab-ports:
    desc: Forward ports 80/443 to nginx service via kubectl port-forward
    cmds:
      - |
        echo "Waiting for nginx pod to be ready..."
        kubectl wait --for=condition=Ready pod -l app=nginx --timeout=120s
      - |
        echo "Starting port-forward: localhost:443 → nginx:443, localhost:80 → nginx:80"
        echo "Access https://localhost or http://localhost"
        echo "Press Ctrl+C to stop"
        sudo kubectl --kubeconfig=$HOME/.kube/config port-forward service/nginx 443:443 80:80 --address 0.0.0.0

  clean:
    cmds:
      - rm -rf data
      - rm -rf result
      - rm -rf result-*
      - rm -rf keys
      - rm -rf *.fd
      - rm -rf *.qcow2
